<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1a1a40"/>
      <stop offset="60%" stop-color="#0d0d20"/>
      <stop offset="100%" stop-color="#06060f"/>
    </radialGradient>
    <radialGradient id="coin" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="55%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#c06a0a"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded -->
  <rect x="0" y="0" width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="96" cy="96" r="76" fill="none" stroke="url(#ring)" stroke-width="3" stroke-dasharray="6 4" opacity="0.55"/>
  <circle cx="96" cy="96" r="68" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>

  <!-- Coin -->
  <circle cx="96" cy="96" r="58" fill="url(#coin)" filter="url(#glow)"/>

  <!-- Highlight -->
  <ellipse cx="78" cy="74" rx="18" ry="10" fill="#fff" opacity="0.45" transform="rotate(-22 78 74)"/>

  <!-- Symbol ₿ -->
  <text x="96" y="124" font-family="Georgia, serif" font-size="86" font-weight="bold"
        text-anchor="middle" fill="#3a1a04" opacity="0.85">₿</text>
  <text x="96" y="122" font-family="Georgia, serif" font-size="86" font-weight="bold"
        text-anchor="middle" fill="#fff" opacity="0.95">₿</text>
</svg>
